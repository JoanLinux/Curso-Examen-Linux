<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ title or 'Curso Linux' }}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body class="{{ page_class or '' }}">
  <header class="topbar">
    <div class="brand-wrap">
      <div class="brand">Curso Linux - Evaluacion en Vivo</div>
      <div class="subbrand">Plataforma de clase y examen en tiempo real</div>
    </div>
    <nav>
      <a href="{{ url_for('index') }}">Inicio</a>
      {% if teacher_nav_mode %}
      <a class="nav-pill" href="{{ url_for('teacher_students_page') }}">APOYO IA ALUMNOS</a>
      <a class="nav-pill" href="{{ url_for('teacher_distros_page') }}">DISTROS PREGUNTAS</a>
      {% endif %}
      {% if show_teacher_link %}
      <a href="{{ url_for('teacher_page') }}">Profesor</a>
      {% endif %}
    </nav>
  </header>
  <main class="container">
    {% block content %}{% endblock %}
  </main>
</body>
</html>
